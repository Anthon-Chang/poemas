<ion-header class="poemas-header">
  <ion-toolbar>
    <ion-title>
      <div class="header-title">
        <ion-icon name="book-outline"></ion-icon>
        <span>Versos del Alma</span>
      </div>
    </ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Buscar poema, autor, época..."
      (ionInput)="filtrar($event)"
      animated="true"
      class="custom-searchbar">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="poemas-content">

  <!-- Decoración fondo -->
  <div class="bg-decoration">
    <div class="ink-drop drop1"></div>
    <div class="ink-drop drop2"></div>
    <div class="ink-drop drop3"></div>
  </div>

  <!-- Skeleton loader -->
  <div *ngIf="cargando" class="skeleton-container">
    <div *ngFor="let i of skeletonArray" class="skeleton-card">
      <ion-skeleton-text animated style="width: 60%; height: 20px; border-radius: 8px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 40%; height: 14px; border-radius: 8px; margin-top: 8px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 100%; height: 60px; border-radius: 8px; margin-top: 12px;"></ion-skeleton-text>
    </div>
  </div>

  <!-- Lista de poemas -->
  <div *ngIf="!cargando" class="poemas-grid">

    <div *ngIf="poemasFiltrados.length === 0" class="empty-state">
      <div class="quill-icon">✒️</div>
      <h3>Ningún poema encontrado</h3>
      <p>Comienza añadiendo tu primer verso</p>
    </div>

    <div *ngFor="let poema of poemasFiltrados" class="poema-card">

      <!-- Imagen si existe -->
      <div *ngIf="poema.imagen_url" class="poema-imagen"
           [style.backgroundImage]="'url(' + poema.imagen_url + ')'">
        <div class="imagen-overlay"></div>
      </div>

      <div class="poema-body">

        <div class="poema-meta">
          <ion-chip class="epoca-chip" *ngIf="poema.epoca">
            <ion-icon name="time-outline"></ion-icon>
            <ion-label>{{ poema.epoca }}</ion-label>
          </ion-chip>
        </div>

        <h2 class="poema-titulo">{{ poema.titulo }}</h2>
        <p class="poema-autor">— {{ poema.autor }}</p>

        <div class="poema-extracto">
          <p>{{ poema.contenido | slice:0:120 }}{{ poema.contenido.length > 120 ? '...' : '' }}</p>
        </div>

        <!-- Acciones multimedia -->
        <div class="multimedia-row">

          <button *ngIf="poema.youtube_url"
                  class="btn-media btn-video"
                  (click)="verVideo(poema)">
            <ion-icon name="logo-youtube"></ion-icon>
            <span>Ver video</span>
          </button>

          <button *ngIf="poema.audio_url"
                  class="btn-media btn-audio"
                  [class.playing]="reproduciendo && audioActivo"
                  (click)="toggleAudio(poema)">
            <ion-icon [name]="reproduciendo ? 'pause-outline' : 'musical-note-outline'"></ion-icon>
            <span>{{ reproduciendo ? 'Pausar' : 'Escuchar' }}</span>
          </button>

        </div>

        <!-- Acciones CRUD -->
        <div class="crud-row">
          <a [routerLink]="['/poemas-form', poema.id]" class="btn-crud btn-edit">
            <ion-icon name="create-outline"></ion-icon>
            Editar
          </a>
          <button class="btn-crud btn-delete" (click)="eliminar(poema.id!)">
            <ion-icon name="trash-outline"></ion-icon>
            Eliminar
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- FAB agregar -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/poemas-form" class="fab-add">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

<!-- Modal video YouTube -->
<div class="video-modal-overlay" *ngIf="poemaActivo" (click)="cerrarVideo()">
  <div class="video-modal-box" (click)="$event.stopPropagation()">
    <div class="video-modal-header">
      <h3>{{ poemaActivo.titulo }}</h3>
      <button class="btn-close-modal" (click)="cerrarVideo()">✕</button>
    </div>
    <div class="video-wrapper">
      <iframe
        [src]="videoUrl"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</div>
