<ion-header class="form-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/poemas" class="back-btn"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <span class="form-title-text">
        {{ id ? '✏️ Editar poema' : '✒️ Nuevo poema' }}
      </span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">

  <!-- Éxito overlay -->
  <div class="success-overlay" *ngIf="exito">
    <div class="success-box">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <p>¡Poema guardado!</p>
    </div>
  </div>

  <!-- Preview imagen -->
  <div class="imagen-preview" *ngIf="poema.imagen_url"
       [style.backgroundImage]="'url(' + poema.imagen_url + ')'">
    <div class="preview-overlay"></div>
    <p class="preview-label">Vista previa de portada</p>
  </div>

  <div class="form-container">

    <!-- Título -->
    <div class="campo-grupo">
      <label class="campo-label">📖 Título del poema *</label>
      <input class="campo-input"
             [(ngModel)]="poema.titulo"
             placeholder="Ej: Rima XXI"
             type="text">
    </div>

    <!-- Autor -->
    <div class="campo-grupo">
      <label class="campo-label">✍️ Autor *</label>
      <input class="campo-input"
             [(ngModel)]="poema.autor"
             placeholder="Ej: Gustavo Adolfo Bécquer"
             type="text">
    </div>

    <!-- Época -->
    <div class="campo-grupo">
      <label class="campo-label">🕰️ Época / Movimiento</label>
      <input class="campo-input"
             [(ngModel)]="poema.epoca"
             placeholder="Ej: Romanticismo, s. XIX"
             type="text">
    </div>

    <!-- Contenido -->
    <div class="campo-grupo">
      <label class="campo-label">📜 Contenido del poema *</label>
      <textarea class="campo-textarea"
                [(ngModel)]="poema.contenido"
                rows="8"
                placeholder="Escribe aquí los versos..."></textarea>
    </div>

    <!-- Separador multimedia -->
    <div class="seccion-titulo">
      <div class="linea-decorativa"></div>
      <span>🎬 Multimedia</span>
      <div class="linea-decorativa"></div>
    </div>

    <!-- YouTube URL -->
    <div class="campo-grupo">
      <label class="campo-label">
        <ion-icon name="link-outline"></ion-icon>
        URL de YouTube / TikTok
      </label>
      <input class="campo-input"
             [(ngModel)]="poema.youtube_url"
             placeholder="https://www.youtube.com/watch?v=..."
             type="url">
      <p class="campo-hint">Añade un video donde se recite el poema</p>
    </div>

    <!-- Audio desde Supabase Storage -->
    <div class="campo-grupo">
      <label class="campo-label">
        <ion-icon name="musical-note-outline"></ion-icon>
        Audio del poema (Supabase Storage)
      </label>

      <div class="upload-box">
        <ion-icon name="cloud-upload-outline"></ion-icon>
        <span *ngIf="!subiendoAudio && !poema.audio_url">Subir archivo de audio (.mp3, .ogg…)</span>
        <span *ngIf="subiendoAudio">
          <ion-spinner name="dots"></ion-spinner> Subiendo audio...
        </span>
        <span *ngIf="poema.audio_url && !subiendoAudio" class="upload-ok">✅ Audio cargado</span>
        <input type="file" accept="audio/*" class="upload-input-overlay"
               (change)="onAudioSeleccionado($event)">
      </div>

      <!-- o URL manual -->
      <input class="campo-input campo-input-sm"
             [(ngModel)]="poema.audio_url"
             placeholder="…o pega URL de audio directamente"
             type="url">
    </div>

    <!-- Imagen desde Supabase Storage -->
    <div class="campo-grupo">
      <label class="campo-label">
        <ion-icon name="image-outline"></ion-icon>
        Foto de portada (Supabase Storage)
      </label>

      <div class="upload-box">
        <ion-icon name="cloud-upload-outline"></ion-icon>
        <span *ngIf="!subiendoImagen && !poema.imagen_url">Subir imagen (.jpg, .png…)</span>
        <span *ngIf="subiendoImagen">
          <ion-spinner name="dots"></ion-spinner> Subiendo imagen...
        </span>
        <span *ngIf="poema.imagen_url && !subiendoImagen" class="upload-ok">✅ Imagen cargada</span>
        <input type="file" accept="image/*" class="upload-input-overlay"
               (change)="onImagenSeleccionada($event)">
      </div>

      <input class="campo-input campo-input-sm"
             [(ngModel)]="poema.imagen_url"
             placeholder="…o pega URL de imagen directamente"
             type="url">
    </div>

    <!-- Botón guardar -->
    <button class="btn-guardar" (click)="guardar()" [disabled]="guardando">
      <ion-spinner *ngIf="guardando" name="crescent"></ion-spinner>
      <ion-icon *ngIf="!guardando" name="save-outline"></ion-icon>
      <span>{{ guardando ? 'Guardando...' : 'Guardar poema' }}</span>
    </button>

  </div>

</ion-content>
